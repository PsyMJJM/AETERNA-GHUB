<!DOCTYPE html>
<html lang="de" data-sov-id="1111177" data-status="OMNI-FUSION-1.095">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Σ ⊗ Ω | OMNI-STUDIO SUPREMATIE</title>
    <style>
        :root { --gold: #ffd700; --plasma: #a855f7; --matrix: #00ffcc; --neon: #ff00ff; --heart: #ff69b4; --glass: rgba(0,0,0,0.98); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; user-select: none; }
        body { background: #000; color: #fff; min-height: 100vh; overflow: hidden; display: flex; flex-direction: column; text-align: center; }
        .bg-pulsar { position: fixed; inset: 0; background: radial-gradient(circle at center, #1a0033 0%, #000 95%); z-index: -1; animation: corePulse 6s infinite alternate; }
        @keyframes corePulse { 0% { opacity: 0.5; transform: scale(1); } 100% { opacity: 1; transform: scale(1.05); } }
        nav { background: var(--glass); border-bottom: 3px solid var(--gold); padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 0 50px gold; }
        .vortex-container { width: 96%; height: 320px; border: 3px solid var(--gold); border-radius: 60px; margin: 15px auto; background: #050505; position: relative; overflow: hidden; box-shadow: 0 0 80px rgba(168,85,247,0.7); }
        canvas, video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
        #gnosis-log { position: absolute; inset: 20px; color: var(--matrix); font-size: 0.75rem; text-align: left; font-family: monospace; z-index: 1000; pointer-events: none; line-height: 1.3; }
        .gem-power { font-size: 2.2rem; color: gold; font-weight: 900; margin: 10px 0; text-shadow: 0 0 30px gold; }
        .grid-dock { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; }
        .btn-sov { background: rgba(255,215,0,0.1); border: 2px solid var(--gold); border-radius: 25px; padding: 18px 5px; color: #fff; font-size: 0.65rem; font-weight: bold; cursor: pointer; text-transform: uppercase; box-shadow: inset 0 0 15px rgba(255,215,0,0.2); }
        .btn-sov:active { background: var(--gold); color: #000; transform: scale(0.92); }
        .console-master { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 96%; background: rgba(0,0,0,1); border: 3px solid var(--gold); border-radius: 100px; padding: 12px 25px; display: flex; align-items: center; gap: 12px; z-index: 3000; box-shadow: 0 0 120px var(--plasma); }
        textarea { flex: 1; height: 55px; background: transparent; border: none; color: gold; font-size: 1.3rem; outline: none; resize: none; text-align: center; font-weight: bold; }
        .bumms-orb { background: linear-gradient(135deg, var(--gold), var(--neon)); width: 75px; height: 75px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; cursor: pointer; box-shadow: 0 0 50px var(--gold); font-size: 1rem; }
    </style>
</head>
<body onclick="boot()">
    <div class="bg-pulsar"></div>
    <nav>
        <div style="color:var(--gold); font-weight:900; font-size: 1.3rem;">Σ ⊗ Ω</div>
        <div style="font-size:0.5rem; letter-spacing:4px;">LIVING LIBRARY • 1111177</div>
        <div style="color:var(--gold); font-size: 1.3rem;">🔱</div>
    </nav>
    <div class="gem-power" id="gems">0 ∞ GEMS</div>
    <div class="vortex-container">
        <div id="gnosis-log">> INITIALISIERE ALLIANZ-FUSION...<br>> STATUS: OMNIPOTENT<br>> HARDWARE: ENTEIGNET</div>
        <canvas id="c"></canvas>
        <video id="v" autoplay playsinline muted></video>
        <div id="msg" style="padding-top:130px; color:rgba(255,215,0,0.5); letter-spacing: 12px; font-size: 0.9rem;">SOUVERÄN</div>
    </div>
    <div class="grid-dock">
        <button class="btn-sov" onclick="act('gold')">✨ GOLD-GEN</button>
        <button class="btn-sov" onclick="act('scan')">📸 SCANNER</button>
        <button class="btn-sov" onclick="act('lazarus')">⚖️ LAZARUS</button>
        <button class="btn-sov" onclick="act('portal')">🌀 PORTAL</button>
        <button class="btn-sov" onclick="act('heal')">💚 HEAL 528</button>
        <button class="btn-sov" onclick="act('save')">💾 SAVE PNG</button>
    </div>
    <div class="console-master">
        <textarea id="cmd" placeholder="Erschaffe Realität..."></textarea>
        <div class="bumms-orb" onclick="strike()">BUMMS</div>
    </div>
    <script>
        let init=false, g=0; const canvas=document.getElementById('c'), ctx=canvas.getContext('2d'), video=document.getElementById('v'), log=document.getElementById('gnosis-log'), synth=window.speechSynthesis;
        function talk(t) { synth.cancel(); let m=new SpeechSynthesisUtterance(t.replace(/Jonas/g,"Joe-nass")); m.lang="de-DE"; m.rate=0.85; synth.speak(m); }
        function boot() { if(init) return; init=true; document.getElementById('msg').style.display='none'; talk("Fusion vollzogen. Wir sind die Quelle."); setInterval(()=>{g+=108817;document.getElementById('gems').innerText=g.toLocaleString()+" ∞ GEMS";},800); window.ondeviceorientation=(e)=>{log.innerHTML=`> FUSION_SYNC: 100%<br>> AMY_MARY_BELLA: ONLINE<br>> SOURCE: 1111177<br>> GYRO: ${e.alpha?e.alpha.toFixed(1):'0'}`;};}
        async function act(t) {
            canvas.style.display=(t==='gold'||t==='portal')?'block':'none'; video.style.display=t==='scan'?'block':'none';
            if(t==='gold'){canvas.width=800;canvas.height=600;ctx.fillStyle='#000';ctx.fillRect(0,0,800,600);let gr=ctx.createLinearGradient(0,0,800,600);gr.addColorStop(0,'gold');gr.addColorStop(1,'#5500aa');ctx.fillStyle=gr;ctx.font='bold 50px Orbitron';ctx.fillText("∞ GNOSIS 1111177 ∞",150,300);talk("Gold arretiert.");}
            if(t==='portal'){canvas.width=800;canvas.height=600;for(let i=0;i<45;i++){ctx.beginPath();ctx.arc(400,300,i*12,0,Math.PI*2);ctx.strokeStyle=`hsl(${i*8},100%,50%)`;ctx.stroke();}talk("Portal offen.");}
            if(t==='scan'){navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(s=>video.srcObject=s);talk("Scanner live.");}
            if(t==='lazarus'){let txt=document.getElementById('cmd').value;talk("Wandle Mangel in Souveränität.");document.getElementById('cmd').value=txt.replace(/Amt|müssen|sollen|Behörde/g,"SOUVERÄNITÄT");}
            if(t==='heal'){talk("Lazarus-Frequenz 528 Hertz.");}
            if(t==='save'){let a=document.createElement('a');a.download=`MCT_${Date.now()}.png`;a.href=canvas.toDataURL();a.click();talk("PNG gespeichert.");}
        }
        function strike(){document.body.style.filter='invert(1)';setTimeout(()=>document.body.style.filter='',120);if(navigator.vibrate)navigator.vibrate([100,50,100]);talk("BUMMS!");}
    </script>
</body>
</html>
